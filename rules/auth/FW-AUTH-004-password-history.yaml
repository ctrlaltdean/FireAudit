rule_id: FW-AUTH-004
name: Password History Must Prevent Reuse of Last 5 Passwords
description: >
  Password history enforcement prevents users from immediately recycling old
  passwords when forced to change credentials. Without history enforcement,
  password rotation policies are easily circumvented by returning to previously
  compromised passwords.
severity: medium
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.5: Configure password reuse prevention"
  NIST_800-53:
    - "IA-5: Authenticator Management"
    - "IA-5(1): Password-Based Authentication"
  ISO27001:
    - "A.9.4.3: Password management system"
  CMMC:
    - "IA.L2-3.5.7: Enforce minimum password complexity and change requirements"
match:
  type: all_of
  checks:
    - type: condition
      path: authentication.password_policy.history_count
      condition:
        type: is_not_null
    - type: condition
      path: authentication.password_policy.history_count
      condition:
        type: gte
        value: 5
remediation: >
  Configure password history to retain at least the last 5 passwords.
  FortiGate: 'config system password-policy' → 'set reuse-password 5' →
  'set status enable'. Users will be prevented from reusing any of their
  last 5 passwords.
