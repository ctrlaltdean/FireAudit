rule_id: FW-AUTH-009
name: Password Maximum Age Must Be Enforced (90 Days or Fewer)
description: >
  Password maximum age enforcement ensures that credentials are rotated
  regularly, limiting the window of opportunity for an attacker who has
  obtained a valid password. Without a maximum age policy, passwords may
  remain valid indefinitely, increasing the risk that compromised credentials
  go undetected and unexpired. The maximum password age should be set to
  90 days or fewer, in line with CIS, NIST, and DISA STIG guidance.
severity: medium
vendors:
  - all
frameworks:
  DISA_STIG:
    - "SRG-NET-000402: The network device must enforce password maximum age"
  CIS:
    - "CIS FW Benchmark 1.5: Configure password expiration policy"
  NIST_800-53:
    - "IA-5: Authenticator Management"
    - "IA-5(1): Password-Based Authentication"
  NIST_CSF:
    - "PR.AC-1: Identities and credentials are issued, managed, verified, revoked, and audited"
  ISO27001:
    - "A.9.4.3: Password management system"
  CMMC:
    - "IA.L2-3.5.7: Enforce minimum password complexity and change requirements"
match:
  type: all_of
  checks:
    - type: condition
      path: authentication.password_policy.max_age_days
      condition:
        type: is_not_null
    - type: condition
      path: authentication.password_policy.max_age_days
      condition:
        type: lte
        value: 90
remediation: >
  Configure a maximum password age of 90 days or fewer on all administrative
  accounts. FortiGate: 'config system password-policy' → 'set expire-day 90'
  → 'set expire-status enable' → end. Ensure the policy applies to all
  privilege levels. Consider 60 days for highly sensitive environments to
  align with DISA STIG requirements.
