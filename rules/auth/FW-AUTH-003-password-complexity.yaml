rule_id: FW-AUTH-003
name: Password Complexity Requirements Must Be Enforced
description: >
  Administrative passwords must be required to contain a mix of character classes
  to increase resistance to guessing and dictionary attacks. At minimum, passwords
  should require both numbers and special characters in addition to letters.
severity: medium
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.5: Configure password complexity"
  NIST_800-53:
    - "IA-5: Authenticator Management"
    - "IA-5(1): Password-Based Authentication"
  NIST_CSF:
    - "PR.AC-1: Identities and credentials are managed"
  ISO27001:
    - "A.9.4.3: Password management system"
  CMMC:
    - "IA.L2-3.5.7: Enforce minimum password complexity and change requirements"
  DISA_STIG:
    - "SRG-NET-000392: The network device must enforce minimum password complexity"
match:
  type: all_of
  checks:
    - type: condition
      path: authentication.password_policy.require_numbers
      condition:
        type: is_true
    - type: condition
      path: authentication.password_policy.require_special
      condition:
        type: is_true
remediation: >
  Enable password complexity requirements including numbers and special characters.
  FortiGate: 'config system password-policy' → 'set status enable' →
  'set must-contain upper-case-letter lower-case-letter number non-alphanumeric'.
  Also set 'set minimum-length 12'.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config system password-policy
        set status enable
        set change-4-characters enable
        set must-contain upper-case-letter lower-case-letter number non-alphanumeric
    end
  paloalto: |
    # PAN-OS CLI
    set mgt-config password-complexity enabled yes
    set mgt-config password-complexity uppercase-lowercase yes
    set mgt-config password-complexity numeric yes
    set mgt-config password-complexity special-char yes
    commit
