rule_id: FW-AUTH-001
name: Minimum Password Length Must Be 12 Characters or More
description: >
  Short passwords are vulnerable to brute-force attacks. Administrative
  accounts must require a minimum password length of at least 12 characters
  per current NIST and CIS guidance.
severity: high
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.5: Configure password policy"
  NIST_800-53:
    - "IA-5: Authenticator Management"
  NIST_CSF:
    - "PR.AC-1: Identities and credentials are managed"
  ISO27001:
    - "A.9.4.3: Password management system"
  CMMC:
    - "IA.L2-3.5.7: Enforce minimum password complexity and change requirements"
  DISA_STIG:
    - "SRG-NET-000395: The network device must enforce password minimum length"
match:
  type: all_of
  checks:
    - type: condition
      path: authentication.password_policy.min_length
      condition:
        type: is_not_null
    - type: condition
      path: authentication.password_policy.min_length
      condition:
        type: gte
        value: 12
remediation: >
  Configure minimum password length of 12 or more characters.
  FortiGate: 'config system password-policy' → 'set minimum-length 12'
  → 'set status enable'. Also set 'config system global' →
  'set admin-password-minimum-length 12'.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config system password-policy
        set status enable
        set minimum-length 12
    end
  cisco_asa: |
    # Cisco ASA does not enforce password length natively.
    # Use TACACS+/RADIUS for full password policy enforcement.
    # Local fallback lockout only:
    aaa local authentication attempts max-fail 3
  paloalto: |
    # PAN-OS CLI
    set mgt-config password-complexity enabled yes
    set mgt-config password-complexity minimum-length 12
    commit
  pfsense: |
    # pfSense: System > User Manager > Settings > Password Policy
    # Set minimum length (GUI configuration)
