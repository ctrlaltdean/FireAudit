rule_id: FW-VPN-002
name: IPsec VPN Tunnels Must Use IKEv2
description: >
  IKEv1 has known vulnerabilities including susceptibility to certain
  Diffie-Hellman attacks and lack of built-in authentication. IKEv2 provides
  improved security, mobility support (MOBIKE), and better DoS resistance.
severity: high
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 4.1: Use IKEv2 for VPN tunnel establishment"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
  NIST_CSF:
    - "PR.DS-2: Data-in-transit is protected"
  ISO27001:
    - "A.10.1.1: Policy on the use of cryptographic controls"
  CMMC:
    - "SC.L2-3.13.8: Implement cryptographic mechanisms"
  DISA_STIG:
    - "SRG-NET-000380: The network device must use FIPS-validated cryptography for VPN"
match:
  type: not_exists_where
  path: vpn.ipsec_tunnels
  where:
    enabled:
      type: is_true
    phase1.ike_version:
      type: eq
      value: 1
remediation: >
  Migrate all IPsec tunnels to IKEv2. FortiGate: In 'config vpn ipsec phase1-interface',
  set 'ike-version 2'. Coordinate with remote VPN peers as both endpoints must
  support IKEv2. Test thoroughly before production deployment.
