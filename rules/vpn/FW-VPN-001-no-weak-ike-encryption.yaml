rule_id: FW-VPN-001
name: IPsec VPN Must Not Use Weak Encryption Algorithms
description: >
  IKE phase 1 and phase 2 must not use deprecated or weak encryption
  algorithms including DES, 3DES, RC4, or NULL encryption. Only AES-128
  or stronger is acceptable.
severity: critical
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 4.1: Use strong VPN encryption"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
    - "SC-28: Protection of Information at Rest"
  NIST_CSF:
    - "PR.DS-2: Data-in-transit is protected"
    - "PR.DS-5: Protections against data leaks implemented"
  ISO27001:
    - "A.10.1.1: Policy on the use of cryptographic controls"
  CMMC:
    - "SC.L2-3.13.8: Implement cryptographic mechanisms to prevent unauthorized disclosure"
  DISA_STIG:
    - "SRG-NET-000380: The network device must use FIPS-validated cryptography for VPN"
match:
  type: not_exists_where
  path: vpn.ipsec_tunnels
  where:
    enabled:
      type: is_true
    phase1.encryption:
      type: intersects
      values:
        - des
        - "3des"
        - "rc4"
        - "null"
remediation: >
  Replace weak encryption algorithms with AES-256 or AES-128.
  FortiGate phase1-interface: 'set proposal aes256-sha256 aes128-sha256'.
  Phase2-interface: 'set proposal aes256-sha256 aes128-sha256'.
  Remove any DES, 3DES, or NULL cipher proposals.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config vpn ipsec phase1-interface
        edit <tunnel-name>
            set proposal aes256-sha256 aes256-sha512
        next
    end
    # Note: Replace <tunnel-name> with the actual tunnel name; remove 3des/des entries
  cisco_asa: |
    # Cisco ASA CLI — replace weak IKEv1 policy with strong encryption
    crypto ikev1 policy 1
      encryption aes-256
      authentication pre-share
      group 14
      hash sha
      lifetime 28800
    no crypto ikev1 policy <old-weak-policy-number>
    # Note: Replace <old-weak-policy-number> with the policy number using weak encryption
  paloalto: |
    # PAN-OS: IKE Crypto profiles > edit the profile
    # Remove DES/3DES from the encryption list (GUI: Network > Network Profiles > IKE Crypto)
