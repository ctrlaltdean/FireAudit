rule_id: FW-VPN-004
name: SSL VPN Must Not Accept TLS 1.0 or 1.1
description: >
  TLS 1.0 and 1.1 are deprecated and vulnerable to POODLE, BEAST, and
  other attacks. SSL VPN must enforce TLS 1.2 at minimum, preferably TLS 1.3.
severity: high
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 4.3: Enforce TLS 1.2 or higher for SSL VPN"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
  NIST_CSF:
    - "PR.DS-2: Data-in-transit is protected"
  ISO27001:
    - "A.10.1.1: Policy on the use of cryptographic controls"
  CMMC:
    - "SC.L2-3.13.8: Implement cryptographic mechanisms"
  DISA_STIG:
    - "SRG-NET-000077: The network device must use FIPS-validated cryptography for remote management"
match:
  type: any_of
  checks:
    - type: condition
      path: vpn.ssl_vpn.enabled
      condition:
        type: is_false
    - type: condition
      path: vpn.ssl_vpn.tls_versions
      condition:
        type: not_intersects
        values:
          - TLSv1.0
          - TLSv1.1
remediation: >
  Configure SSL VPN to use TLS 1.2 minimum. FortiGate: 'config vpn ssl settings'
  → 'set ssl-min-proto-ver tls1-2'. Recommend setting to 'tls1-3' where
  client compatibility permits. Disable TLS 1.0 and 1.1 explicitly.
