rule_id: FW-VPN-003
name: IPsec VPN Must Not Use Weak Diffie-Hellman Groups
description: >
  DH groups 1, 2, and 5 are cryptographically weak and vulnerable to
  downgrade attacks. Minimum acceptable DH group is 14 (2048-bit).
  Groups 19, 20, 21 (ECDH) or 24 (2048-bit MODP with 256-bit PRP) are preferred.
severity: high
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 4.1: Use strong Diffie-Hellman groups for key exchange"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
  NIST_CSF:
    - "PR.DS-2: Data-in-transit is protected"
  ISO27001:
    - "A.10.1.1: Policy on the use of cryptographic controls"
  CMMC:
    - "SC.L2-3.13.8: Implement cryptographic mechanisms"
  DISA_STIG:
    - "SRG-NET-000015: The network device must use approved cryptographic mechanisms"
match:
  type: not_exists_where
  path: vpn.ipsec_tunnels
  where:
    enabled:
      type: is_true
    phase1.dh_groups:
      type: intersects
      values:
        - 1
        - 2
        - 5
remediation: >
  Replace weak DH groups with group 14 or higher. Recommended: groups 19, 20,
  or 21 (ECDH). FortiGate: 'config vpn ipsec phase1-interface' → 'set dhgrp 14 19 20 21'.
  Also update phase2: 'config vpn ipsec phase2-interface' → 'set dhgrp 14 19 20 21'.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config vpn ipsec phase1-interface
        edit <tunnel-name>
            set dhgrp 14 19 20
        next
    end
    # Note: Replace <tunnel-name> with the actual tunnel name; remove groups 1, 2, 5
  cisco_asa: |
    # Cisco ASA CLI
    crypto ikev2 policy 1
      group 14
    # Note: Remove any policies specifying group 1, 2, or 5
  paloalto: |
    # PAN-OS: IKE Crypto profiles > edit > remove DH Group 1, 2, 5
    # (GUI: Network > Network Profiles > IKE Crypto)
