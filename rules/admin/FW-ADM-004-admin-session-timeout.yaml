rule_id: FW-ADM-004
name: Administrative Session Timeout Must Be 10 Minutes or Less
description: >
  Idle administrative sessions must time out automatically to prevent
  unauthorized access from unattended terminals. Maximum timeout is
  10 minutes (600 seconds) per CIS guidelines.
severity: medium
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.4: Configure session timeout"
  NIST_800-53:
    - "AC-11: Session Lock"
    - "AC-12: Session Termination"
  NIST_CSF:
    - "PR.AC-3: Remote access is managed"
  ISO27001:
    - "A.9.4.2: Secure log-on procedures"
  CMMC:
    - "AC.L2-3.1.10: Use session lock after period of inactivity"
  DISA_STIG:
    - "SRG-NET-000062: The network device must terminate management sessions after inactivity"
not_applicable_when:
  type: all_of
  checks:
    - type: condition
      path: meta.vendor
      condition:
        type: in
        values: [pfsense, opnsense]
    - type: condition
      path: admin_access.session_timeout_seconds
      condition:
        type: is_null
not_applicable_reason: >
  pfSense/OPNsense session timeout is a PHP compile-time constant and is not
  exposed in config.xml. The timeout cannot be audited from the configuration
  export; verify manually in System > Advanced > Admin Access.
match:
  type: all_of
  checks:
    - type: condition
      path: admin_access.session_timeout_seconds
      condition:
        type: is_not_null
    - type: condition
      path: admin_access.session_timeout_seconds
      condition:
        type: lte
        value: 600
remediation: >
  Set administrative session timeout to 10 minutes or less.
  FortiGate: 'config system global' → 'set admintimeout 10'
  (value is in minutes, so 10 = 600 seconds).
  pfSense/OPNsense: Navigate to System > Advanced > Admin Access and set the
  session timeout to 10 minutes. Note: this value is not stored in config.xml
  and cannot be verified via automated audit.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config system global
        set admintimeout 10
    end
    # Unit is minutes; valid range 1-480
  cisco_asa: |
    # Cisco ASA CLI
    ssh timeout 10
    console timeout 10
    # Unit is minutes
  paloalto: |
    # PAN-OS CLI
    set deviceconfig system idle-timeout 10
    commit
    # Unit is minutes
  pfsense: |
    # pfSense: System > Advanced > Admin Access > Session Timeout
    # Set to 10 minutes (GUI configuration — not stored in config.xml)
  sonicwall: |
    # SonicWall: Manage > Appliance > Administration > Web Management Settings
    # Set Inactivity Timeout to 10 minutes (GUI configuration)
  sophos_xg: |
    # Sophos XG: Administration > Admin and user settings > Session timeout
    # Set to 10 minutes (GUI configuration)
  watchguard: |
    # WatchGuard Firebox: System > Administration > Admin Session Timeout
    # Set to 10 minutes (GUI configuration via Policy Manager or Web UI)
