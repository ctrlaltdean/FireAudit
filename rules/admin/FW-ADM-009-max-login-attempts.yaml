rule_id: FW-ADM-009
name: Administrative Login Lockout Must Be Configured
description: >
  Account lockout must be configured to limit brute-force attempts against
  administrative credentials. After a defined number of failed attempts the
  account or source IP must be locked out for a period of time. Unconfigured
  lockout allows unlimited password guessing.
severity: high
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.5: Configure account lockout"
  NIST_800-53:
    - "AC-7: Unsuccessful Logon Attempts"
    - "IA-5: Authenticator Management"
  NIST_CSF:
    - "PR.AC-1: Identities and credentials are managed"
  ISO27001:
    - "A.9.4.2: Secure log-on procedures"
  CMMC:
    - "AC.L2-3.1.8: Limit unsuccessful logon attempts"
  DISA_STIG:
    - "SRG-NET-000041: The network device must enforce a limit of consecutive invalid logon attempts"
match:
  type: all_of
  checks:
    - type: condition
      path: admin_access.max_login_attempts
      condition:
        type: is_not_null
    - type: condition
      path: admin_access.max_login_attempts
      condition:
        type: lte
        value: 10
remediation: >
  Configure account lockout after no more than 10 failed login attempts
  (5 or fewer recommended). FortiGate: 'config system global' →
  'set admin-lockout-threshold 5' → 'set admin-lockout-duration 300'.
  This locks out the source after 5 failures for 5 minutes.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config system global
        set admin-lockout-threshold 3
        set admin-lockout-duration 300
    end
    # lockout-duration is in seconds; 300 = 5 minutes
  cisco_asa: |
    # Cisco ASA CLI
    aaa local authentication attempts max-fail 3
  paloalto: |
    # PAN-OS CLI
    set deviceconfig system max-login-attempts 3
    set deviceconfig system lockout-time 5
    commit
    # lockout-time is in minutes
  pfsense: |
    # pfSense: System > Advanced > Admin Access > Login Protection
    # Enable and configure max attempts (GUI configuration)
  watchguard: |
    # WatchGuard: System > Administration > Failed Login Policy
    # Configure max attempts and lockout duration (GUI configuration)
