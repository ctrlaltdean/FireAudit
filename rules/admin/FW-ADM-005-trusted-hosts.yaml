rule_id: FW-ADM-005
name: Administrative Access Must Be Restricted to Trusted Hosts
description: >
  Management access should be limited to specific IP addresses or subnets
  (trusted hosts). Unrestricted management access exposes the device
  to brute-force and exploitation from any network location.
severity: high
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.3: Restrict management access"
  NIST_800-53:
    - "AC-3: Access Enforcement"
    - "AC-17: Remote Access"
    - "SI-3: Malicious Code Protection"
  NIST_CSF:
    - "PR.AC-3: Remote access is managed"
  ISO27001:
    - "A.9.4.2: Secure log-on procedures"
    - "A.13.1.3: Segregation in networks"
  CMMC:
    - "AC.L1-3.1.2: Limit access to types of transactions"
match:
  type: condition
  path: admin_access.trusted_hosts
  condition:
    type: is_not_empty
remediation: >
  Define trusted host restrictions for all administrator accounts.
  FortiGate: Under each admin account in 'config system admin', set
  'trusthost1' through 'trusthost6' to allowed management subnets.
  Avoid using 0.0.0.0/0 as a trusted host.
