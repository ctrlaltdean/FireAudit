rule_id: FW-ADM-014
name: SSH Must Not Use Weak Ciphers or MACs
description: >
  SSH should be configured to use only FIPS-approved ciphers and MACs.
  Weak algorithms such as arcfour (RC4), 3des-cbc, blowfish-cbc, hmac-md5,
  and hmac-sha1 are cryptographically broken or deprecated and must be
  disabled. When the SSH cipher or MAC list is explicitly configured on the
  device and contains known-weak algorithms, this rule will fire. If the
  cipher/MAC list is not explicitly configured (empty), this rule does not
  apply — most modern platforms use secure defaults.
severity: medium
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.2: Use only approved SSH ciphers and MACs"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
    - "SC-13: Cryptographic Protection"
  NIST_CSF:
    - "PR.DS-2: Data-in-transit is protected"
    - "PR.AC-3: Remote access is managed"
  ISO27001:
    - "A.10.1.1: Policy on the use of cryptographic controls"
    - "A.14.1.3: Protecting application services transactions"
  CMMC:
    - "SC.L2-3.13.8: Implement cryptographic mechanisms"
    - "SC.L2-3.13.10: Employ FIPS-validated cryptography"
  DISA_STIG:
    - "SRG-NET-000572: The network device must implement SSH using FIPS-validated algorithms"
match:
  type: all_of
  checks:
    - type: any_of
      checks:
        - type: condition
          path: admin_access.ssh_settings.ciphers
          condition:
            type: is_empty
        - type: condition
          path: admin_access.ssh_settings.ciphers
          condition:
            type: not_intersects
            values:
              - arcfour
              - arcfour128
              - arcfour256
              - 3des-cbc
              - blowfish-cbc
              - cast128-cbc
    - type: any_of
      checks:
        - type: condition
          path: admin_access.ssh_settings.macs
          condition:
            type: is_empty
        - type: condition
          path: admin_access.ssh_settings.macs
          condition:
            type: not_intersects
            values:
              - hmac-md5
              - hmac-sha1
              - umac-64
              - hmac-md5-96
              - hmac-sha1-96
remediation: >
  Configure SSH to use only FIPS-approved ciphers and MACs. Remove all weak
  algorithms including arcfour, 3des-cbc, blowfish-cbc, hmac-md5, hmac-sha1,
  and umac-64 variants. Acceptable ciphers include aes128-ctr, aes192-ctr,
  aes256-ctr, aes128-gcm@openssh.com, and aes256-gcm@openssh.com. Acceptable
  MACs include hmac-sha2-256, hmac-sha2-512, and umac-128@openssh.com.
  FortiGate: SSH cipher/MAC configuration is managed via 'config system global'
  and may require FortiOS 7.x or later to explicitly configure per-algorithm
  lists. Ensure 'set strong-crypto enable' is set under 'config system global'
  to restrict the platform to FIPS-approved algorithms.
