rule_id: FW-ADM-002
name: Telnet Management Must Be Disabled
description: >
  Telnet transmits all data including credentials in cleartext.
  Management access must use SSH or HTTPS exclusively.
severity: critical
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.1: Disable insecure management protocols"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
    - "IA-2: Identification and Authentication"
  NIST_CSF:
    - "PR.AC-3: Remote access is managed"
  ISO27001:
    - "A.9.4.2: Secure log-on procedures"
  CMMC:
    - "AC.L1-3.1.13: Employ cryptographic mechanisms"
  DISA_STIG:
    - "SRG-NET-000023: The network device must terminate all unencrypted remote management connections"
match:
  type: foreach
  path: admin_access.management_protocols
  filter:
    field: protocol
    condition:
      type: eq
      value: telnet
  checks:
    - path: enabled
      condition:
        type: is_false
remediation: >
  Disable Telnet on all management interfaces. Use SSH version 2 exclusively.
  FortiGate: 'config system global' → 'set admin-telnet disable'.
