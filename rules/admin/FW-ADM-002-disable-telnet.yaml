rule_id: FW-ADM-002
name: Telnet Management Must Be Disabled
description: >
  Telnet transmits all data including credentials in cleartext.
  Management access must use SSH or HTTPS exclusively.
severity: critical
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.1: Disable insecure management protocols"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
    - "IA-2: Identification and Authentication"
  NIST_CSF:
    - "PR.AC-3: Remote access is managed"
  ISO27001:
    - "A.9.4.2: Secure log-on procedures"
  CMMC:
    - "AC.L1-3.1.13: Employ cryptographic mechanisms"
  DISA_STIG:
    - "SRG-NET-000138: The network device must control remote access methods"
match:
  type: foreach
  path: admin_access.management_protocols
  filter:
    field: protocol
    condition:
      type: eq
      value: telnet
  checks:
    - path: enabled
      condition:
        type: is_false
remediation: >
  Disable Telnet on all management interfaces. Use SSH version 2 exclusively.
  FortiGate: 'config system global' → 'set admin-telnet disable'.
vendor_commands:
  fortigate: |
    # FortiOS CLI — remove telnet from allowaccess on each affected interface
    config system interface
        edit <interface-name>
            set allowaccess <existing-protocols-minus-telnet>
        next
    end
    # Note: List only the protocols you want to keep (e.g., https ssh ping)
  cisco_asa: |
    # Cisco ASA CLI — remove telnet access entries
    no telnet <ip> <mask> <interface>
    # Note: Run this for each telnet entry shown in 'show running-config telnet'
  paloalto: |
    # PAN-OS CLI
    set deviceconfig system service disable-telnet yes
    commit
  pfsense: |
    # pfSense: Telnet is not enabled by default.
    # If enabled via a package, remove the package via System > Package Manager.
  sonicwall: |
    # SonicWall: Manage > Appliance > Administration
    # Uncheck Telnet Management (GUI configuration)
  watchguard: |
    # WatchGuard: Telnet management is disabled by default in modern Fireware.
    # Verify under System > Administration (GUI configuration)
