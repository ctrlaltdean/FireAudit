rule_id: FW-ADM-006
name: Login Banner Must Be Configured
description: >
  A pre-login warning banner is required for legal and compliance purposes.
  The banner should state that unauthorized access is prohibited and that
  the system is subject to monitoring.
severity: low
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.8: Configure a warning login banner"
  NIST_800-53:
    - "AC-8: System Use Notification"
  NIST_CSF:
    - "PR.AC-3: Remote access is managed"
  ISO27001:
    - "A.9.4.2: Secure log-on procedures"
  CMMC:
    - "AC.L2-3.1.9: Provide security awareness training"
  DISA_STIG:
    - "SRG-NET-000268: The network device must display a login banner"
match:
  type: condition
  path: admin_access.banner_enabled
  condition:
    type: is_true
remediation: >
  Configure a pre-login warning banner. FortiGate: 'config system global' →
  'set pre-login-banner enable'. Set banner text via the GUI or CLI.
  Banner should reference unauthorized access prohibition and monitoring notice.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config system global
        set pre-login-banner enable
        set post-login-banner enable
    end
    # Set banner text in System > Replacement Messages > Auth > Login Disclaimer
  cisco_asa: |
    # Cisco ASA CLI
    banner login Unauthorized access is prohibited. All activity is monitored.
    banner motd Authorized users only.
    # Replace with your organization's approved banner text
  paloalto: |
    # PAN-OS CLI
    set deviceconfig system login-banner "Unauthorized access is prohibited."
    commit
  pfsense: |
    # pfSense: System > Advanced > Admin Access > Login Banner
    # Enter banner text (GUI configuration)
  watchguard: |
    # WatchGuard: System > Administration > Login Message
    # Enter banner text (GUI configuration via Policy Manager or Web UI)
