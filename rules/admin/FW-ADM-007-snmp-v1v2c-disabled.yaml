rule_id: FW-ADM-007
name: SNMP v1 and v2c Must Be Disabled
description: >
  SNMPv1 and SNMPv2c use community strings transmitted in cleartext, providing
  no authentication or encryption. These versions are trivially sniffable and
  susceptible to community string brute force. SNMPv3 with authentication and
  privacy (authPriv) must be used exclusively.
severity: critical
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.7: Disable insecure management protocols"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
    - "AC-17: Remote Access"
    - "IA-3: Device Identification and Authentication"
  NIST_CSF:
    - "PR.AC-3: Remote access is managed"
    - "PR.PT-3: Principle of least functionality is incorporated"
  ISO27001:
    - "A.9.4.2: Secure log-on procedures"
    - "A.13.1.1: Network controls"
  CMMC:
    - "AC.L1-3.1.13: Employ cryptographic mechanisms to protect CUI"
    - "IA.L2-3.5.3: Use multi-factor authentication"
  DISA_STIG:
    - "SRG-NET-000168: The network device must use SNMPv3 with authentication and privacy"
match:
  type: any_of
  checks:
    - type: condition
      path: admin_access.snmp.enabled
      condition:
        type: is_null
    - type: condition
      path: admin_access.snmp.enabled
      condition:
        type: is_false
    - type: condition
      path: admin_access.snmp.version
      condition:
        type: in
        values:
          - v3
          - "3"
          - snmpv3
remediation: >
  Disable SNMPv1 and SNMPv2c. Configure SNMPv3 with authPriv security level only.
  FortiGate: Remove all 'config system snmp community' entries. Configure
  'config system snmp user' with security-level auth-priv, auth-proto SHA256,
  and priv-proto AES256. Restrict SNMP access to trusted management hosts.
vendor_commands:
  fortigate: |
    # FortiOS CLI — delete each SNMPv1/v2c community entry
    config system snmp community
        delete 1
    end
    # Note: Repeat 'delete <id>' for each community; verify with: get system snmp community
  cisco_asa: |
    # Cisco ASA CLI
    no snmp-server community <community-string>
    no snmp-server enable traps
    # Note: Replace <community-string> with your actual community string(s)
  paloalto: |
    # PAN-OS CLI
    delete deviceconfig system snmp-setting
    commit
  pfsense: |
    # pfSense: Services > SNMP
    # Uncheck Enable (GUI configuration)
  sonicwall: |
    # SonicWall: Manage > Appliance > SNMP
    # Disable SNMPv1/v2c (GUI configuration)
  watchguard: |
    # WatchGuard: System > SNMP
    # Disable v1/v2c (GUI configuration)
