rule_id: FW-ADM-001
name: HTTP Management Must Be Disabled
description: >
  Plain-text HTTP access to the management interface must be disabled.
  HTTP transmits credentials and session data in cleartext, exposing them
  to network eavesdropping.
severity: critical
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 1.1: Disable insecure management protocols"
  NIST_800-53:
    - "SC-8: Transmission Confidentiality and Integrity"
    - "AC-17: Remote Access"
  NIST_CSF:
    - "PR.AC-3: Remote access is managed"
  ISO27001:
    - "A.9.4.2: Secure log-on procedures"
  CMMC:
    - "AC.L1-3.1.13: Employ cryptographic mechanisms to protect CUI"
  DISA_STIG:
    - "SRG-NET-000138: The network device must control remote access methods"
match:
  type: foreach
  path: admin_access.management_protocols
  filter:
    field: protocol
    condition:
      type: eq
      value: http
  checks:
    - path: enabled
      condition:
        type: is_false
remediation: >
  Disable HTTP management access. On FortiGate: 'config system global' →
  'set admin-http disable'. Ensure HTTPS is enabled and uses TLS 1.2+.
  Remove HTTP from interface allowaccess settings.
vendor_commands:
  fortigate: |
    # FortiOS CLI — remove http from allowaccess on each affected interface
    config system interface
        edit <interface-name>
            set allowaccess <existing-protocols-minus-http>
        next
    end
    # Note: Replace <interface-name> and list only the protocols you want to keep
    # (e.g., set allowaccess https ssh ping)
  cisco_asa: |
    # Cisco ASA CLI — disable the ASDM HTTP server
    no http server enable
    # Also remove per-host HTTP entries if present:
    no http <ip> <mask> <interface>
  paloalto: |
    # PAN-OS CLI
    set deviceconfig system service disable-http yes
    commit
  pfsense: |
    # pfSense: System > Advanced > Admin Access > Protocol
    # Select HTTPS only (GUI configuration)
  watchguard: |
    # WatchGuard: System > Administration
    # Disable HTTP management (GUI configuration)
