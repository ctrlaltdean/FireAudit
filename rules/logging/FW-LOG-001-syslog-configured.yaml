rule_id: FW-LOG-001
name: Remote Syslog Server Must Be Configured
description: >
  Log data must be forwarded to a remote syslog server for centralized
  storage, analysis, and protection from tampering. Local-only logging is
  insufficient for security monitoring and incident response.
severity: high
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 2.1: Enable logging to remote syslog"
  NIST_800-53:
    - "AU-3: Content of Audit Records"
    - "AU-9: Protection of Audit Information"
    - "SI-4: System Monitoring"
  NIST_CSF:
    - "DE.AE-1: Baseline network operations established"
    - "DE.CM-1: Network monitored for attacks"
  ISO27001:
    - "A.12.4.1: Event logging"
    - "A.12.4.2: Protection of log information"
  CMMC:
    - "AU.L2-3.3.1: Create and retain audit logs"
    - "AU.L2-3.3.2: Ensure audit log review and reporting"
  DISA_STIG:
    - "SRG-NET-000532: The network device must configure logging to a remote log server"
match:
  type: condition
  path: logging.syslog_servers
  condition:
    type: count_gt
    value: 0
remediation: >
  Configure at least one remote syslog server. FortiGate: 'config log syslogd setting'
  → 'set status enable' → 'set server <SIEM-IP>' → 'set port 514'
  → 'set mode reliable' (for TCP syslog). Consider using TLS syslog for
  log integrity in transit.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config log syslogd setting
        set status enable
        set server <syslog-server-ip>
        set port 514
        set facility local7
        set format default
    end
    # Note: Replace <syslog-server-ip> with your actual syslog/SIEM server address
  cisco_asa: |
    # Cisco ASA CLI
    logging enable
    logging host <interface> <syslog-server-ip>
    logging trap informational
    logging on
    # Note: Replace <interface> and <syslog-server-ip> with actual values
  paloalto: |
    # PAN-OS CLI
    set shared log-settings syslog <profile-name> server <server-name> server <ip> transport UDP port 514
    commit
    # Note: Replace <profile-name>, <server-name>, and <ip> with actual values
  pfsense: |
    # pfSense: Status > System Logs > Settings > Remote Logging
    # Enter syslog server IP and enable remote logging (GUI configuration)
  watchguard: |
    # WatchGuard: System > Logging > Log Servers > Add
    # Enter syslog server address (GUI configuration)
