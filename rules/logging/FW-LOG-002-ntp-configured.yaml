rule_id: FW-LOG-002
name: NTP Must Be Configured for Accurate Log Timestamps
description: >
  Accurate timestamps are essential for log correlation, incident response,
  and compliance. NTP must be configured to synchronize the device clock
  with authoritative time servers.
severity: medium
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 2.2: Configure NTP"
  NIST_800-53:
    - "AU-8: Time Stamps"
  NIST_CSF:
    - "DE.AE-1: Baseline of network operations established"
  ISO27001:
    - "A.12.4.4: Clock synchronisation"
  CMMC:
    - "AU.L2-3.3.7: Provide system capability to compare/synchronize clocks"
  DISA_STIG:
    - "SRG-NET-000531: The network device must use NTP for time synchronization"
match:
  type: all_of
  checks:
    - type: condition
      path: logging.ntp_enabled
      condition:
        type: is_true
    - type: condition
      path: logging.ntp_servers
      condition:
        type: is_not_empty
remediation: >
  Configure NTP with at least two time servers. FortiGate: 'config system ntp'
  → 'set status enable' → 'set type custom' → edit entries with server addresses.
  Use stratum 1 or 2 servers and prefer internal NTP infrastructure where available.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config system ntp
        set ntpsync enable
        set type custom
        config ntpserver
            edit 1
                set server <ntp-server-ip-or-hostname>
                set ntpv3 disable
            next
        end
    end
    # Note: Replace <ntp-server-ip-or-hostname> with your NTP server address
  cisco_asa: |
    # Cisco ASA CLI
    ntp server <ip> source <interface>
    ntp authenticate
    # Note: Replace <ip> and <interface> with actual values
  paloalto: |
    # PAN-OS CLI
    set deviceconfig system ntp-servers primary-ntp-server ntp-server-address <ip>
    commit
    # Note: Replace <ip> with your NTP server address
  pfsense: |
    # pfSense: Services > NTP
    # Add NTP server (GUI configuration)
  watchguard: |
    # WatchGuard: System > NTP > Add Server
    # Enter NTP server address (GUI configuration)
