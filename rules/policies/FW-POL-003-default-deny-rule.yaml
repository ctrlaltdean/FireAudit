rule_id: FW-POL-003
name: An Explicit Deny Rule Must Exist in the Policy
description: >
  Firewall policy should include at least one explicit deny rule to enforce
  default-deny behavior. While most platforms (including FortiGate, Cisco ASA,
  and pfSense) have an implicit deny-all at the end of the rule base, that
  implicit rule does not generate log entries and is not visible during a policy
  review. An explicit deny rule provides a visible audit artifact, enables
  logging of denied traffic (see also FW-POL-004), and documents the intended
  policy posture. Note: failing this rule does not mean traffic is passing
  unfiltered — the implicit deny still blocks it.
severity: high
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 3.1: Implement deny by default"
    - "CIS FW Benchmark 3.2: Configure explicit deny-all rule"
  NIST_800-53:
    - "AC-3: Access Enforcement"
    - "SC-7: Boundary Protection"
  NIST_CSF:
    - "PR.AC-5: Network integrity is protected (e.g., network segregation, network segmentation)"
  ISO27001:
    - "A.13.1.3: Segregation in networks"
  CMMC:
    - "AC.L1-3.1.2: Limit access to types of transactions"
    - "SC.L1-3.13.1: Monitor, control, and protect communications"
  DISA_STIG:
    - "SRG-NET-000230: The firewall must have an explicit deny-all rule as the last rule in the policy"
match:
  type: condition
  path: firewall_policies
  condition:
    type: exists_where
    where:
      action:
        type: in
        values:
          - deny
          - drop
          - reject
      enabled:
        type: is_true
remediation: >
  Add an explicit deny-all rule at the bottom of the firewall policy. Ensure
  logging is enabled on the deny rule so that blocked traffic is recorded.
  FortiGate: Add a policy with action 'deny', srcaddr 'all', dstaddr 'all',
  schedule 'always', logtraffic 'all'. Place it after all permit rules.
vendor_commands:
  fortigate: |
    # FortiOS CLI
    config firewall policy
        edit 0
            set name "Explicit-Deny-All"
            set srcintf "any"
            set dstintf "any"
            set srcaddr "all"
            set dstaddr "all"
            set action deny
            set schedule "always"
            set service "ALL"
            set logtraffic all
            set comments "Explicit deny-all — audit artifact"
        next
    end
    # Note: Place this rule after all permit rules using the 'move' command if needed
  cisco_asa: |
    # Cisco ASA CLI — add explicit deny for logging visibility
    # (ASA has an implicit deny; this adds an explicit logged deny)
    access-list OUTSIDE_IN extended deny ip any any log
    # Note: Replace OUTSIDE_IN with the actual ACL name applied to your outside interface
  paloalto: |
    # PAN-OS: Add a deny-all rule at the bottom in Policies > Security
    # Use the GUI for correct rule ordering (GUI configuration)
