rule_id: FW-POL-001
name: No Unrestricted Any-to-Any Allow Policies
description: >
  Firewall policies that allow traffic from any source to any destination
  on any service effectively bypass all access controls. Such rules violate
  the principle of least privilege and must not exist in production configurations.
severity: critical
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 3.1: Deny by default"
    - "CIS FW Benchmark 3.3: Review permissive rules"
  NIST_800-53:
    - "AC-3: Access Enforcement"
    - "SC-7: Boundary Protection"
  NIST_CSF:
    - "PR.AC-5: Network integrity is protected"
    - "DE.CM-1: Network monitored for attacks"
  ISO27001:
    - "A.13.1.3: Segregation in networks"
  CMMC:
    - "AC.L1-3.1.2: Limit access to types of transactions"
    - "SC.L1-3.13.1: Monitor communications at external boundaries"
  DISA_STIG:
    - "SRG-NET-000230: The firewall must deny network communications traffic by default and allow traffic by exception"
match:
  type: not_exists_where
  path: firewall_policies
  where:
    action:
      type: eq
      value: allow
    enabled:
      type: is_true
    source_addresses:
      type: contains
      value: all
    destination_addresses:
      type: contains
      value: all
remediation: >
  Review and remove or restrict any permit-all rules. Replace with specific
  source/destination/service combinations that implement least-privilege access.
  FortiGate: Review 'config firewall policy' for policies where srcaddr and
  dstaddr are both 'all' with action 'accept'.
