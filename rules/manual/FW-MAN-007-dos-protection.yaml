rule_id: FW-MAN-007
name: DoS/DDoS Protection Profiles Must Be Configured on Internet-Facing Interfaces
description: >
  Denial-of-Service protection profiles defend against SYN floods, UDP floods,
  ICMP floods, and other volumetric attacks that can overwhelm the firewall or
  downstream services. Profile thresholds, coverage scope, and effectiveness
  require operational review as they depend on baseline traffic knowledge and
  are not fully assessable from the static configuration.
severity: medium
vendors:
  - all
frameworks:
  CIS:
    - "CIS FW Benchmark 5.4: Configure DoS protection"
  NIST_800-53:
    - "SC-5: Denial-of-Service Protection"
    - "SC-7: Boundary Protection"
  NIST_CSF:
    - "PR.DS-4: Adequate capacity to ensure availability is maintained"
    - "DE.CM-1: Network is monitored to detect potential cybersecurity events"
  ISO27001:
    - "A.12.1.3: Capacity management"
    - "A.13.1.1: Network controls"
  CMMC:
    - "SC.L2-3.13.1: Monitor, control, and protect communications"
match:
  type: manual
  guidance: >
    Verify: (1) DoS protection profiles are applied to all internet-facing interfaces.
    (2) SYN, UDP, ICMP, and other flood protection thresholds are configured
    based on baseline traffic analysis (not left at default values).
    (3) Anomaly detection is enabled. (4) DoS protection logs are reviewed
    regularly. (5) Rate limits do not block legitimate traffic (thresholds
    were validated against real traffic patterns).
remediation: >
  Create and apply DoS protection policies. FortiGate: 'config firewall
  DoS-policy' → create a policy with anomaly entries for each protocol.
  Apply to the WAN interface in the ingress direction. Tune thresholds
  using traffic baselines to avoid false positives. Enable logging on
  all anomaly actions.
