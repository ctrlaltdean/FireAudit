ASA Version 9.16(4)
!
hostname ASA-EDGE-01
!
names
!
interface GigabitEthernet0/0
 nameif outside
 security-level 0
 ip address 203.0.113.1 255.255.255.248
!
interface GigabitEthernet0/1
 nameif inside
 security-level 100
 ip address 10.10.1.1 255.255.255.0
!
interface GigabitEthernet0/2
 nameif dmz
 security-level 50
 ip address 10.20.1.1 255.255.255.0
!
interface Management0/0
 management-only
 nameif management
 security-level 100
 ip address 10.99.1.1 255.255.255.0
!
ftp mode passive
clock timezone EST -5
clock summer-time EDT recurring
!
object network CORP-NET
 subnet 10.10.1.0 255.255.255.0
 description Corporate LAN
!
object network DMZ-SERVER
 host 10.20.1.100
 description DMZ Web Server
!
object network ANY
 subnet 0.0.0.0 0.0.0.0
!
object-group network INTERNAL-NETS
 network-object object CORP-NET
 network-object 10.20.1.0 255.255.255.0
!
object service HTTPS
 service tcp destination eq 443
!
object service CUSTOM-APP
 service tcp destination range 8000 8443
!
access-list OUTSIDE_IN extended permit tcp any host 10.20.1.100 eq 443 log
access-list OUTSIDE_IN extended deny ip any any log
access-list INSIDE_OUT extended permit ip 10.10.1.0 255.255.255.0 any log
access-list INSIDE_OUT extended permit ip any any
!
access-group OUTSIDE_IN in interface outside
access-group INSIDE_OUT in interface inside
!
nat (inside,outside) dynamic interface
!
logging enable
logging timestamp
logging list CRITICAL_EVENTS level critical
logging list CRITICAL_EVENTS level warnings
logging host inside 10.10.1.200 udp/514
logging host management 10.10.1.201 tcp/6514
logging trap informational
logging asdm informational
!
ntp server 10.10.1.10 source inside prefer
ntp server pool.ntp.org source outside
!
no http server enable
http server enable 443
http 10.10.1.0 255.255.255.0 management
http 10.10.1.0 255.255.255.0 inside
!
ssh 10.10.1.0 255.255.255.0 inside
ssh 10.10.1.0 255.255.255.0 management
ssh version 2
ssh timeout 10
!
telnet timeout 5
!
username admin password 8 $sha2$rounds=100000$... privilege 15
username svc-readonly password 8 $sha2$... privilege 5
!
password-policy minimum-length 14
password-policy minimum-uppercase 1
password-policy minimum-lowercase 1
password-policy minimum-numeric 1
password-policy minimum-special 1
password-policy lifetime 90
!
aaa local authentication attempts max-fail 5
!
aaa-server CORP-RADIUS protocol radius
aaa-server CORP-RADIUS (inside) host 10.10.1.150
 key someradius-key
 authentication-port 1812
!
banner motd UNAUTHORIZED ACCESS IS STRICTLY PROHIBITED.
banner motd All activity on this system is monitored and logged.
banner login Welcome to ASA-EDGE-01. Authorized users only.
!
ssl server-version tlsv1.2
ssl cipher default fips
ssl cipher tlsv1.2 high
!
crypto ikev2 policy 10
 encryption aes-256 aes-192 aes
 integrity sha256 sha384 sha512
 group 14 19 20 21
 prf sha256
 lifetime seconds 86400
!
crypto ikev2 policy 20
 encryption 3des
 integrity sha-1
 group 2 5
 lifetime seconds 86400
!
crypto isakmp policy 10
 authentication pre-share
 encryption aes-256
 hash sha256
 group 14
 lifetime 86400
!
crypto ipsec ikev2 ipsec-proposal AES256-SHA256
 protocol esp encryption aes-256
 protocol esp integrity sha-256
!
crypto ipsec ikev2 ipsec-proposal LEGACY-3DES
 protocol esp encryption 3des
 protocol esp integrity md5
!
crypto ipsec transform-set ESP-AES256-SHA256 esp-aes-256 esp-sha256-hmac
 mode tunnel
!
crypto ipsec transform-set LEGACY-3DES esp-3des esp-md5-hmac
 mode tunnel
!
crypto map OUTSIDE_MAP 10 ipsec-isakmp
 set peer 198.51.100.10
 set ikev2 ipsec-proposal AES256-SHA256
 set pfs group19
 match address VPN-HQ-ACL
!
crypto map OUTSIDE_MAP 20 ipsec-isakmp
 set peer 192.0.2.50
 set transform-set LEGACY-3DES
 match address VPN-PARTNER-ACL
!
crypto map OUTSIDE_MAP interface outside
!
webvpn
 enable outside
 anyconnect image disk0:/anyconnect-win-4.10.pkg
 anyconnect enable
 tunnel-group-list enable
!
