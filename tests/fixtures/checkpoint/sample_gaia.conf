# ==============================================================================
# SYNTHETIC TEST FIXTURE — Check Point Gaia OS 'show configuration' output
# DO NOT USE IN PRODUCTION — Generated for FireAudit parser testing only
#
# Intentional security gaps (should trigger FAIL findings):
#   - Telnet enabled
#   - SNMPv2c community string present (no v3 configured)
#   - TLS 1.0 minimum (SSLv3 → TLS1.0 effective minimum)
#   - No login banner configured
#   - Weak password policy (min length 6, no complexity, no history)
#   - Default 'admin' account exists
#   - No max login attempt limit
#   - Session timeout too long (60 min)
#
# Correct controls (should trigger PASS findings):
#   - SSH v2 enabled
#   - NTP configured with two servers
#   - Remote syslog server configured
#   - Local syslog enabled
#   - Hostname and domain set
# ==============================================================================

set hostname FW-CP-GW-01
set domainname corp.example.com
set edition Standard
set gaia-version R81.10

# Network interfaces
set interface eth0 ipv4-address 203.0.113.1 mask-length 24
set interface eth0 state on
set interface eth0 comments "WAN Interface"
set interface eth0 mtu 1500
set interface eth1 ipv4-address 10.0.0.1 mask-length 24
set interface eth1 state on
set interface eth1 comments "LAN Interface"
set interface eth1 mtu 1500
set interface eth2 ipv4-address 172.16.0.1 mask-length 24
set interface eth2 state on
set interface eth2 comments "DMZ Interface"
set interface eth2 mtu 1500
set interface lo ipv4-address 127.0.0.1 mask-length 8
set interface lo state on

# Routing
set static-route 0.0.0.0/0 nexthop gateway address 203.0.113.254 on
set static-route 10.100.0.0/16 nexthop gateway address 10.0.0.254 on

# DNS
set dns primary 8.8.8.8
set dns secondary 8.8.4.4
set dns suffix corp.example.com

# NTP — correctly configured
set ntp active on
set ntp server primary 10.0.0.10 version 2
set ntp server secondary 10.0.0.11 version 2

# Syslog — remote logging configured correctly
set syslog on
set syslog facility local7
add syslog log-remote-address 10.0.0.100 protocol udp port 514
add syslog log-remote-address 10.0.0.101 protocol udp port 514

# SSH — correctly configured for v2
set ssh enable on

# Telnet — INTENTIONAL SECURITY GAP: should be disabled
set telnet on

# Web management / HTTPS
set web enable on
set web ssl-port 443
# INTENTIONAL SECURITY GAP: TLS 1.0 minimum (SSLv3)
set web min-ssl-version SSLv3

# INTENTIONAL SECURITY GAP: No banner configured
# set banner "Authorized users only. Unauthorized access is prohibited."

# INTENTIONAL SECURITY GAP: Session timeout too long (60 minutes)
set session-timeout 60

# INTENTIONAL SECURITY GAP: No login attempt limit configured
# set login-max-failed-auth 5

# SNMP — INTENTIONAL SECURITY GAP: SNMPv2c (community string, no v3)
set snmp agent on
set snmp agent-version v2c
set snmp community public read-only
set snmp sysname FW-CP-GW-01
set snmp syslocation "Data Center Rack A"
set snmp syscontact "netops@corp.example.com"

# Users — INTENTIONAL SECURITY GAP: default 'admin' account exists
set user admin password-hash $6$rounds=5000$fakesalt$hashedpasswordhere
set user admin shell /bin/bash
set user admin real-name "Administrator"
set user auditor password-hash $6$rounds=5000$fakesalt2$hashedpassword2here
set user auditor shell /bin/bash
set user auditor real-name "Read-Only Auditor"
set user operator password-hash $6$rounds=5000$fakesalt3$hashedpassword3here
set user operator shell /bin/bash

# INTENTIONAL SECURITY GAP: Weak password policy
set password-policy min-password-length 6
# No max-password-validity set (no expiration)
# No history-length set (no history)
set password-policy complexity-class 0

# Core dump settings
set core-dump enable off
set core-dump path /var/log/dump/usermode

# DHCP relay
set dhcp relay interface eth1 server 10.0.0.50

# Proxy ARP
set proxy-arp interface eth0 ip 203.0.113.10

# Physical interface settings
set interface eth0 auto-negotiation on
set interface eth1 auto-negotiation on
set interface eth2 auto-negotiation on

# IPv6 (disabled)
set ipv6-state off

# High availability — standalone mode
set ha-state standalone

# Check Point management access
set management interface eth1
set management access on

# Firewall blade
set firewall blade on

# Logging blade
set logging blade on

# SmartEvent
set smartevent blade off

# Threat prevention
set threat-prevention blade off

# URL filtering
set url-filtering blade off

# Application control
set application-control blade off

# Anti-spam
set anti-spam blade off

# Anti-virus
set anti-virus blade off

# Identity awareness
set identity-awareness blade off

# Mobile access
set mobile-access blade off

# DLP
set dlp blade off

# VPN blade
set vpn blade on

# Cluster XL
set clusterxl off

# Process monitoring
set process cpd on
set process fwd on
set process cpca on

# Audit logging
set audit-log rotate-size 100
set audit-log max-files 10

# Core features
set ftp-proxy on port 21
set cpmiquerybin attribute SIC_POLICY_INSTALLED value 1

# RADIUS authentication (not configured — gaps in remote auth)
# add radius-server primary host 10.0.0.20 port 1812 secret <secret>

# TACACS+ authentication (not configured)
# add tacacs-server primary host 10.0.0.21 port 49 secret <secret>

# Certificate settings
set ssl-cert subject "CN=FW-CP-GW-01,O=corp.example.com"
set ssl-cert not-after 20261231235959

# Kernel parameters
set kernel-params forwarding on
set kernel-params rp-filter off
