#config-version=FGT60F-7.2.5-FW-build1517-230228:opmode=1:vdom=0:user=admin

config system global
    set hostname FW-BRANCH-01
    set admintimeout 5
    set admin-lockout-threshold 3
    set admin-lockout-duration 300
    set admin-https enable
    set admin-http disable
    set admin-telnet disable
    set admin-ssh enable
    set admin-ssh-port 22
    set admin-https-port 443
    set pre-login-banner enable
    set post-login-banner enable
    set ssl-min-proto-version TLSv1-2
    set timezone 12
end

config system password-policy
    set status enable
    set minimum-length 12
    set must-contain upper-case lower-case digit special-char
    set expire-status enable
    set expire-day 90
    set reuse-password 5
end

config system admin
    edit admin
        set accprofile super_admin
        set vdom root
        set password ENC SomeEncryptedHashValue==
        set two-factor disable
        set trusthost1 10.10.1.0 255.255.255.0
        set trusthost2 192.168.100.5 255.255.255.255
    next
    edit svc-audit
        set accprofile read-only
        set vdom root
        set password ENC AnotherEncryptedHashValue==
        set two-factor fortitoken
        set trusthost1 10.10.1.50 255.255.255.255
    next
end

config system interface
    edit port1
        set vdom root
        set ip 10.10.1.1 255.255.255.0
        set allowaccess ping https ssh
        set type physical
        set description "LAN Interface"
        set status up
    next
    edit port2
        set vdom root
        set ip 203.0.113.5 255.255.255.248
        set allowaccess ping
        set type physical
        set description "WAN Interface"
        set status up
    next
    edit ssl.root
        set vdom root
        set type tunnel
        set description "SSL VPN Interface"
        set status up
    next
end

config system ntp
    set status enable
    set type custom
    set syncinterval 60
    config ntpserver
        edit 1
            set server pool.ntp.org
            set ntpv3 disable
        next
        edit 2
            set server time.cloudflare.com
        next
    end
end

config system snmp sysinfo
    set status enable
    set description "Branch Firewall"
    set contact-info "noc@example.com"
    set location "Branch Office"
end

config system snmp community
    edit 1
        set name public
        set status enable
        config hosts
            edit 1
                set interface port1
                set ip 10.10.1.100 255.255.255.255
            next
        end
    next
end

config log syslogd setting
    set status enable
    set server 10.10.1.200
    set port 514
    set mode reliable
    set facility local7
end

config log syslogd2 setting
    set status enable
    set server 10.10.1.201
    set port 6514
    set mode reliable
end

config log syslogd filter
    set severity information
    set forward-traffic enable
    set local-traffic enable
    set sniffer-traffic disable
    set anomaly enable
    set voip disable
end

config log setting
    set log-user-in-upper enable
end

config vpn ipsec phase1-interface
    edit VPN-HEADOFFICE
        set interface port2
        set ike-version 2
        set peertype any
        set proposal aes256-sha256 aes128-sha256
        set dhgrp 19 20 14
        set remote-gw 198.51.100.10
        set psksecret ENC SuperSecretPSK123==
        set keylife 86400
        set authmethod psk
    next
    edit VPN-PARTNER-LEGACY
        set interface port2
        set ike-version 1
        set peertype any
        set proposal 3des-sha1 aes128-md5
        set dhgrp 2 5
        set remote-gw 192.0.2.50
        set psksecret ENC LegacyPSK==
        set keylife 28800
        set authmethod psk
    next
end

config vpn ipsec phase2-interface
    edit VPN-HEADOFFICE-P2
        set phase1name VPN-HEADOFFICE
        set proposal aes256-sha256 aes128-sha256
        set dhgrp 19 20 14
        set pfs enable
        set keylifeseconds 3600
    next
    edit VPN-PARTNER-LEGACY-P2
        set phase1name VPN-PARTNER-LEGACY
        set proposal 3des-sha1 aes128-md5
        set dhgrp 2 5
        set pfs disable
        set keylifeseconds 28800
    next
end

config vpn ssl settings
    set status enable
    set ssl-min-proto-ver tls1-2
    set algorithm high
    set idle-timeout 300
    set auth-timeout 28800
    set tunnel-ip-pools SSLVPN_TUNNEL_ADDR1
    set split-tunneling disable
    set reqclientcert disable
end

config firewall address
    edit all
        set type ipmask
        set subnet 0.0.0.0 0.0.0.0
    next
    edit CORP-NET
        set type ipmask
        set subnet 10.10.1.0 255.255.255.0
    next
    edit DMZ-SERVER
        set type ipmask
        set subnet 10.20.1.100 255.255.255.255
    next
end

config firewall service custom
    edit HTTP
        set tcp-portrange 80
    next
    edit HTTPS
        set tcp-portrange 443
    next
    edit CUSTOM-APP
        set tcp-portrange 8443
    next
end

config firewall policy
    edit 1
        set name "LAN-to-WAN"
        set srcintf port1
        set dstintf port2
        set srcaddr CORP-NET
        set dstaddr all
        set action accept
        set schedule always
        set service ALL
        set logtraffic all
        set nat enable
        set status enable
        set comments "Outbound NAT policy"
    next
    edit 2
        set name "Allow-HTTPS-DMZ"
        set srcintf port2
        set dstintf port1
        set srcaddr all
        set dstaddr DMZ-SERVER
        set action accept
        set schedule always
        set service HTTPS
        set logtraffic all
        set status enable
    next
    edit 3
        set name "DENY-ALL-INBOUND"
        set srcintf port2
        set dstintf port1
        set srcaddr all
        set dstaddr all
        set action deny
        set schedule always
        set service ALL
        set logtraffic all
        set status enable
    next
    edit 4
        set name "TEMP-ANY-ANY"
        set srcintf port1
        set dstintf port2
        set srcaddr all
        set dstaddr all
        set action accept
        set schedule always
        set service ALL
        set logtraffic disable
        set status enable
        set comments "TEMPORARY - remove before audit"
    next
end

config user radius
    edit CORP-RADIUS
        set server 10.10.1.150
        set secret ENC RadiusSecret==
        set auth-port 1812
        set acct-port 1813
    next
end
