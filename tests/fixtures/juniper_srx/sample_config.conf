version 22.4R1.10;

system {
    host-name SRX-BRANCH-01;
    domain-name branch.example.com;
    time-zone America/New_York;

    ## Root authentication
    root-authentication {
        encrypted-password "$6$rounds=5000$fakesalt$roothashedpasswordhere";
    }

    login {
        ## INTENTIONAL SECURITY GAP: No login message/banner configured
        ## message "Authorized users only.";
        retry-options {
            tries-before-disconnect 5;
            minimum-time 30;
            backoff-threshold 2;
            backoff-factor 5;
            lockout-period 5;
        }
        ## INTENTIONAL SECURITY GAP: default 'admin' account exists
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$rounds=5000$fakesalt2$adminhashedpassword";
            }
        }
        user netops {
            uid 2001;
            class operator;
            authentication {
                encrypted-password "$6$rounds=5000$fakesalt3$netopshashedpassword";
            }
        }
        user readonly {
            uid 2002;
            class read-only;
            authentication {
                encrypted-password "$6$rounds=5000$fakesalt4$readonlyhashedpassword";
            }
        }
    }

    services {
        ## SSH — correctly configured for v2, root login denied
        ssh {
            root-login deny;
            protocol-version v2;
            max-sessions-per-connection 1;
            client-alive-interval 300;
        }
        ## INTENTIONAL SECURITY GAP: Telnet is enabled
        telnet;
        ## HTTPS management — correctly enabled
        web-management {
            https {
                system-generated-certificate;
                port 8443;
            }
        }
    }

    syslog {
        ## Remote syslog server — correctly configured
        host 10.0.0.100 {
            any info;
            port 514;
        }
        host 10.0.0.101 {
            any notice;
            port 514;
        }
        ## Local file logging
        file messages {
            any critical;
            authorization info;
        }
        file interactive-commands {
            interactive-commands any;
        }
        ## Log authentication events
        file auth-log {
            authorization any;
        }
    }

    ntp {
        server 10.0.0.10;
        server 10.0.0.11 prefer;
    }

    ## INTENTIONAL SECURITY GAP: SNMPv2c community string present
    snmp {
        name "SRX-BRANCH-01";
        description "Branch firewall";
        location "Branch Office Rack B";
        contact "netops@example.com";
        community public {
            authorization read-only;
        }
        community netmonitor {
            authorization read-only;
            clients {
                10.0.0.0/24;
            }
        }
        ## Note: No SNMPv3 configured — gap
    }

    name-server {
        8.8.8.8;
        8.8.4.4;
    }

    domain-search [ branch.example.com example.com ];
}

interfaces {
    ge-0/0/0 {
        description "WAN";
        unit 0 {
            family inet {
                address 203.0.113.1/24;
            }
        }
    }
    ge-0/0/1 {
        description "LAN";
        unit 0 {
            family inet {
                address 10.0.0.1/24;
            }
        }
    }
    ge-0/0/2 {
        description "DMZ";
        unit 0 {
            family inet {
                address 172.16.0.1/24;
            }
        }
    }
    lo0 {
        description "Loopback";
        unit 0 {
            family inet {
                address 127.0.0.1/8;
            }
        }
    }
    st0 {
        description "VPN Tunnel";
        unit 0 {
            family inet;
        }
    }
}

routing-options {
    static {
        route 0.0.0.0/0 next-hop 203.0.113.254;
    }
}

security {
    ## Firewall policies
    policies {
        ## INTENTIONAL SECURITY GAP: any-to-any allow with no logging, no comment
        from-zone trust to-zone untrust {
            policy allow-outbound-any {
                match {
                    source-address any;
                    destination-address any;
                    application any;
                }
                then {
                    permit;
                }
            }
        }
        ## Correct: explicit deny inbound with logging
        from-zone untrust to-zone trust {
            policy deny-inbound {
                match {
                    source-address any;
                    destination-address any;
                    application any;
                }
                then {
                    deny;
                    log {
                        session-close;
                    }
                }
            }
        }
        ## Allow specific DMZ to LAN traffic with logging
        from-zone dmz to-zone trust {
            policy allow-dmz-to-lan-web {
                match {
                    source-address dmz-servers;
                    destination-address lan-servers;
                    application junos-http;
                }
                then {
                    permit;
                    log {
                        session-init;
                        session-close;
                    }
                }
            }
        }
        ## Default policy
        default-policy {
            deny-all;
        }
    }

    zones {
        security-zone trust {
            host-inbound-traffic {
                system-services {
                    ssh;
                    https;
                    ping;
                    ntp;
                    snmp;
                    dns;
                }
            }
            interfaces {
                ge-0/0/1.0;
            }
        }
        security-zone untrust {
            host-inbound-traffic {
                system-services {
                    ike;
                    ping;
                }
            }
            interfaces {
                ge-0/0/0.0;
            }
        }
        security-zone dmz {
            host-inbound-traffic {
                system-services {
                    ping;
                }
            }
            interfaces {
                ge-0/0/2.0;
            }
        }
    }

    ## IKE configuration
    ike {
        ## Strong proposal
        proposal ike-prop-strong {
            authentication-method pre-shared-keys;
            dh-group group14;
            authentication-algorithm sha-256;
            encryption-algorithm aes-256-cbc;
            lifetime-seconds 28800;
        }
        ## INTENTIONAL SECURITY GAP: weak DH group 2
        proposal ike-prop-weak {
            authentication-method pre-shared-keys;
            dh-group group2;
            authentication-algorithm sha-1;
            encryption-algorithm 3des-cbc;
            lifetime-seconds 86400;
        }
        policy ike-pol-main {
            mode main;
            proposals ike-prop-strong;
            pre-shared-key ascii-text "$9$strongkeyvalue";
        }
        ## INTENTIONAL SECURITY GAP: aggressive mode
        policy ike-pol-aggressive {
            mode aggressive;
            proposals ike-prop-weak;
            pre-shared-key ascii-text "$9$weakaggressivekey";
        }
        gateway ike-gw-branch {
            ike-policy ike-pol-main;
            address 198.51.100.1;
        }
        ## INTENTIONAL SECURITY GAP: aggressive mode gateway
        gateway ike-gw-legacy {
            ike-policy ike-pol-aggressive;
            address 198.51.100.2;
        }
    }

    ## IPsec configuration
    ipsec {
        proposal ipsec-prop-strong {
            protocol esp;
            authentication-algorithm hmac-sha-256-128;
            encryption-algorithm aes-256-cbc;
            lifetime-seconds 3600;
        }
        ## INTENTIONAL SECURITY GAP: 3DES weak encryption
        proposal ipsec-prop-weak {
            protocol esp;
            authentication-algorithm hmac-md5-96;
            encryption-algorithm 3des-cbc;
            lifetime-seconds 28800;
        }
        policy ipsec-pol-strong {
            perfect-forward-secrecy {
                keys group14;
            }
            proposals ipsec-prop-strong;
        }
        policy ipsec-pol-weak {
            proposals ipsec-prop-weak;
        }
        vpn site-vpn-branch {
            bind-interface st0.0;
            gateway ike-gw-branch;
            ipsec-policy ipsec-pol-strong;
        }
        vpn site-vpn-legacy {
            bind-interface st0.0;
            gateway ike-gw-legacy;
            ipsec-policy ipsec-pol-weak;
        }
    }

    ## Screen options
    screen {
        ids-option untrust-screen {
            icmp {
                ping-death;
            }
            ip {
                source-route-option;
                tear-drop;
            }
            tcp {
                syn-flood {
                    alarm-threshold 1024;
                    attack-threshold 200;
                    source-threshold 1024;
                    destination-threshold 2048;
                    timeout 20;
                }
                land;
            }
        }
    }

    nat {
        source {
            rule-set trust-to-untrust {
                from zone trust;
                to zone untrust;
                rule masquerade {
                    match {
                        source-address 0.0.0.0/0;
                    }
                    then {
                        source-nat {
                            interface;
                        }
                    }
                }
            }
        }
    }
}

firewall {
    filter protect-re {
        term allow-management {
            from {
                source-address {
                    10.0.0.0/24;
                    172.16.0.0/24;
                }
                protocol tcp;
                destination-port [ ssh https ];
            }
            then accept;
        }
        term default-deny {
            then {
                discard;
            }
        }
    }
}

policy-options {
    prefix-list management-hosts {
        10.0.0.0/24;
        172.16.0.0/24;
    }
}
